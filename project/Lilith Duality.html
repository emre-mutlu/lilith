<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Duality / Conversations — Lilith × Varlık</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: #0A0A0A;
    color: #E0E0E0;
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  #root { min-height: 100vh; }

  .root-shell {
    position: relative;
    min-height: 100vh;
    display: flex; flex-direction: column;
    transition: box-shadow 1s ease, background-image 1s ease;
  }

  /* HEADER */
  .header {
    display: flex; justify-content: space-between; align-items: flex-end; gap: 24px;
    padding: 22px 32px 18px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  /* MAIN GRID */
  .main-grid {
    position: relative;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    padding: 28px 32px;
    flex: 1;
    min-height: 0;
  }

  .center-overlay {
    position: absolute;
    left: 50%; top: 28px;
    transform: translateX(-50%);
    pointer-events: none;
    z-index: 20;
    display: flex;
    justify-content: center;
  }

  /* FOOTER */
  .footer-grid {
    display: grid;
    grid-template-columns: 280px 1fr;
    border-top: 1px solid rgba(255,255,255,0.08);
    background: rgba(0,0,0,0.35);
    min-height: 240px;
  }

  /* CONTROL BAR */
  .control-bar {
    display: flex; align-items: center; gap: 16px;
    padding: 12px 22px;
    background: #040404;
    border-top: 1px solid rgba(255,255,255,0.08);
  }
  .start-btn {
    display: inline-flex; align-items: center; gap: 9px;
    padding: 8px 16px;
    border-radius: 3px; cursor: pointer;
    transition: filter 0.2s, transform 0.05s;
    font-size: 14px;
  }
  .start-btn:hover { filter: brightness(1.06); }
  .start-btn:active { transform: translateY(1px); }

  .icon-btn {
    width: 34px; height: 34px;
    display: inline-flex; align-items: center; justify-content: center;
    border: 1px solid rgba(255,255,255,0.16);
    background: transparent;
    color: rgba(255,255,255,0.75);
    border-radius: 3px;
    cursor: pointer; transition: all 0.18s;
  }
  .icon-btn:hover { color: #fff; border-color: rgba(255,255,255,0.35); }

  .intervention-input {
    flex: 1;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.12);
    color: #E0E0E0;
    padding: 8px 12px;
    border-radius: 3px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  .intervention-input::placeholder {
    color: rgba(255,255,255,0.30);
    font-style: italic;
  }
  .intervention-input:focus { border-color: rgba(168,85,247,0.55); }
  .intervention-input:disabled { opacity: 0.5; cursor: not-allowed; }

  .intervene-btn {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 8px 14px;
    background: rgba(168,85,247,0.14);
    border: 1px solid rgba(168,85,247,0.50);
    color: #D8B4FE;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    border-radius: 3px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.18s;
  }
  .intervene-btn:hover:not(:disabled) {
    background: rgba(168,85,247,0.24);
    color: #fff;
  }
  .intervene-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .mobile-tabs { display: none; }
  .mobile-word { display: none; }

  @media (max-width: 980px) {
    .header { flex-direction: column; align-items: flex-start; gap: 14px; }
    .mobile-tabs {
      display: flex;
      position: sticky; top: 0; z-index: 30;
      background: rgba(10,10,10,0.85);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .main-grid {
      grid-template-columns: 1fr;
      padding: 20px;
    }
    .center-overlay { display: none; }
    .footer-grid { grid-template-columns: 1fr; }
    .footer-grid > div:first-child {
      border-right: none !important;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .control-bar { flex-wrap: wrap; padding: 10px 14px; }
    .control-bar form { width: 100%; max-width: none; }
    .mobile-word {
      display: block;
      padding: 8px 18px;
      background: rgba(212,175,55,0.08);
      border-top: 1px solid rgba(212,175,55,0.18);
      border-bottom: 1px solid rgba(212,175,55,0.18);
    }
  }

  /* Scrollbar (subtle) */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.18); }

  /* Animations */
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.45; transform: scale(0.85); }
  }
  @keyframes softpulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.55; }
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  @keyframes wave {
    from { transform: scaleY(0.4); }
    to   { transform: scaleY(1); }
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="sentiment.js"></script>
  <script type="text/babel" src="panels.jsx"></script>
  <script type="text/babel" src="footer.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
